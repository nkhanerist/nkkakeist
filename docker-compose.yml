services:
  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html
    ports:
      - "8000:8000"
      - "5190:5190"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DEV_LOGIN_ENABLED: "true"
      APP_TIMEZONE: Asia/Tokyo
      TZ: Asia/Tokyo
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: asset_manager
      DB_USERNAME: laravel
      DB_PASSWORD: secret
    depends_on:
      db:
        condition: service_healthy
    command:
      - bash
      - /var/www/html/scripts/start-dev.sh

  db:
    image: mysql:8.4
    ports:
      - "13306:3306"
    environment:
      MYSQL_DATABASE: asset_manager
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
      TZ: Asia/Tokyo
    volumes:
      - db-data:/var/lib/mysql
    command: --default-time-zone=+09:00
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  db-data:
